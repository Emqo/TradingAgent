# TradingAgent 配置文件
# 复制此文件为 config.yaml 并填入真实值

# LLM 配置
llm:
  # 默认使用的 provider
  default: "claude"

  providers:
    claude:
      base_url: "https://token-plan-cn.xiaomimimo.com/anthropic"
      api_key: "your-api-key"
      model: "mimo-v2.5-pro"

    openai:
      base_url: "https://your-proxy.com/v1"
      api_key: "your-api-key"
      model: "gpt-4o"

# Binance 配置
binance:
  testnet: true
  api_key: "your-binance-api-key"
  api_secret: "your-binance-api-secret"

# 数据库配置 (Phase 5+)
database:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  dbname: "trading_agent"

# Agent 配置
agent:
  # 决策循环间隔
  interval: "1m"
  # 最大 token 限制
  max_tokens: 4096
  # 温度
  temperature: 0.7

# 风控配置
risk:
  # 单笔最大仓位 (USDT)
  max_position_usdt: 1000
  # 单日最大亏损 (USDT)
  max_daily_loss_usdt: 500
  # 最大回撤百分比
  max_drawdown_pct: 10
